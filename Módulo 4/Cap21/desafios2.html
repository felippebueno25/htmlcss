<!DOCTYPE html>
<html lang="pt-BR">     
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios</title>

    <style>
        h1#titulo {
            margin: 0 auto;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 250px;
            margin: 0 auto;
        }
        
        td {
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 id="titulo"></h1>
    <table>
        <tr>
            <td colspan="4">A</td>
            <td rowspan="4">B</td>
        </tr>
        <tr>
            <td rowspan="4">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>J</td>
            <td>K</td>
            <td>L</td>
        </tr>
        <tr>
            <td colspan="4">M</td>
        </tr>
    </table>

    <script>
        var titulo = document.getElementsByTagName("title")[0].innerHTML
        document.getElementById("titulo").innerHTML = titulo

        var celulas = document.getElementsByTagName("td")
        for (var i=0; i < celulas.length; i++){
            if (i % 2 === 0) {
            celulas[i].style.backgroundColor = "lightgray"
            } else {
            celulas[i].style.backgroundColor = "lightblue"

            }
        }
    </script>

</body>
</html>

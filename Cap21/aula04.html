<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption e Escopo em Tabelas</title>
    <style>

        h1#titulo {
            background-color: yellowgreen;
            padding: 8px;
            /* margin: 0; */
        }

        div#tabela {
            text-align: center;
            height: fit-content;
            width: fit-content;
        }

        table {
            border: 1px solid rgb(0, 0, 0);
            border-collapse: collapse;
            /* height: 400px;
            width: 400px; */
        }
        
        caption {
            border: 1px solid rgb(0, 0, 0);
            background-color: rgb(197, 197, 197);
            color: gray;
            padding: 8px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bold;
        }


        th {
            border: 1px solid black;
            background-color: gray;
            color: white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            padding-left: 15px;
            padding-right: 15px;
            font-size: small;
        }

        td {
            border: 1px solid black;
            text-align: center;
            /* vertical-align: top; */
            font-family: monospace;
            padding: 8px;
        }

        td.nome {
            color: rgb(105, 150, 0);
        }

        td.sobrenome {
            color: blueviolet;
        }

        </style>
</head>
<body>
    <div id="tabela">
        <h1 id="titulo">Tabelas!</h1>
        <table>
            <caption>Nomes</caption>
                <thead>
                    <tr>
                        <th scope="col" style="width: 100px;">Primeiro</th>
                        <th scope="col">Segundo</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td class="nome">Felippe</td>
                        <td class="sobrenome">Bueno</strong></td>
                    </tr>
                    <tr>
                        <td class="nome">Mirian</td>
                        <td class="sobrenome">Bueno</strong></td>
                    </tr>
                    <tr>
                        <td class="nome">Roberto</td>
                        <td class="sobrenome">Bueno</strong></td>
                    </tr>
                    <tr>
                        <td class="nome">Myllena</td>
                        <td class="sobrenome">Bueno</strong></td>
                    </tr>
                    <tr>
                        <td class="nome">Loki</td>
                        <td class="sobrenome">Bueno</strong></td>
                    </tr>
                </tbody>

                <tfoot>
                    <th scope="row">Total</th>
                    <td id="Total"></td>
                </tfoot>
        </table>
    </div>
    <script>
        var total = document.querySelectorAll(".nome")
        document.getElementById("Total").innerHTML = `<strong>${total.length}</strong>`

        var titulo = document.getElementsByTagName("title")[0].innerHTML
        document.getElementById("titulo").innerHTML = titulo
    </script>
</body>
</html>

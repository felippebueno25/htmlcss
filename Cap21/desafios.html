<!DOCTYPE html>
<html lang="pt-BR">     
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios</title>

    <style>
        h1#titulo {
            margin: 0 auto;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 250px;
            margin: 0 auto;
        }
        
        td {
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 id="titulo"></h1>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td colspan="3">8</td>
            <td>9</td>
        </tr>
        <tr>
            <td rowspan="2">10</td>
            <td colspan="2">11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>

    <script>
        var titulo = document.getElementsByTagName("title")[0].innerHTML
        document.getElementById("titulo").innerHTML = titulo

        var celulas = document.getElementsByTagName("td")
        for (var i=0; i < celulas.length; i++){
            if (parseInt(celulas[i].innerText) % 2 === 0) {
            celulas[i].style.backgroundColor = "lightgreen"
            } else {
            celulas[i].style.backgroundColor = "lightblue"

            }
        }
    </script>

</body>
</html>

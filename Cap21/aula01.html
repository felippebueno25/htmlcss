<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table {
            border: 1px solid rgb(58, 218, 130);
            border-collapse: collapse;
        }
        
        td, th, caption {
            border: 1px solid black;
            padding: 8px;
        }
        </style>
</head>
<body>
    <table align="center">

            <tr>

            </tr>

                <td>Bueno</strong></td>
            </tr>
            <tr>
                <td>Mirian</td>
                <td>Bueno</strong></td>
            </tr>
            <tr>
                <td>Roberto</td>
                <td>Bueno</strong></td>
            </tr>
            <tr>
                <td>Myllena</td>
                <td>Bueno</strong></td>
            </tr>
    </table>

    <script>
        var titulo = document.getElementsByTagName("title")[0].innerHTML
            document.getElementById("titulo").innerHTML = titulo
    </script>
    
</body>
</html>

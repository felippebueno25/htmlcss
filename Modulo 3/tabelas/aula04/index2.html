<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Tabelas Mescladas</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: monospace, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        table {
            border-collapse: collapse;
            position: relative;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 20px;
            text-align: center;
        }
        div {
            margin: 0;
        }
        h1 {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>Desafio Tabelas Mescladas</h1>
        <table>
            <tr>
                <td colspan="4">A</td>
                <td rowspan="4">B</td>
            </tr>
            <tr>
                <td rowspan="4">C</td>
                <td>D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <tr>
                <td>G</td>
                <td>H</td>
                <td>I</td>
            </tr>
            <tr>
                <td>J</td>
                <td>K</td>
                <td>L</td>
            </tr>
            <tr>
                <td colspan="4">M</td>
            </tr>
        </table>
    </div>
</body>
</html>
